{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass-panel">
    <h2>Create an Account</h2>
    <p class="subtitle text-center">Join our AI Interview Platform</p>
    
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Enter username" class="glass-input">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password" class="glass-input">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    
    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
    </div>
</div>
{% endblock %}
